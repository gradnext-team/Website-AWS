name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Detect which parts of the repo changed
  # ─────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ─────────────────────────────────────────────
  # Deploy Backend → EC2
  # ─────────────────────────────────────────────
  deploy-backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /app

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Activate virtual environment and install/update dependencies
            source /app/backend/venv/bin/activate
            pip install -r /app/backend/requirements.txt --quiet

            # Write environment file from GitHub secrets
            cat > /app/backend/.env << 'ENVEOF'
            MONGO_URL=${{ secrets.MONGO_URL }}
            DB_NAME=${{ secrets.DB_NAME }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
            RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
            RAZORPAY_WEBHOOK_SECRET=${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
            GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
            GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
            GOOGLE_SERVICE_ACCOUNT_JSON=${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
            GOOGLE_IMPERSONATE_EMAIL=${{ secrets.GOOGLE_IMPERSONATE_EMAIL }}
            EMERGENT_LLM_KEY=${{ secrets.EMERGENT_LLM_KEY }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            WATI_API_TOKEN=${{ secrets.WATI_API_TOKEN }}
            ENVEOF

            # Restart the backend service
            sudo systemctl restart gradnext-backend

            # Wait and verify it came back up
            sleep 5
            sudo systemctl is-active --quiet gradnext-backend && echo "Backend is running" || (sudo journalctl -u gradnext-backend -n 50 && exit 1)

  # ─────────────────────────────────────────────
  # Deploy Frontend → S3 + CloudFront
  # ─────────────────────────────────────────────
  deploy-frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React app
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL }}
          REACT_APP_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GENERATE_SOURCEMAP: false
          FAST_REFRESH: false
        run: npm run build

      - name: Upload to S3
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync build to S3
        run: |
          # Upload static assets with long cache (1 year)
          aws s3 sync frontend/build/ s3://${{ secrets.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.json"

          # Upload index.html and JSON with no-cache (always fresh)
          aws s3 cp frontend/build/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

          aws s3 sync frontend/build/ s3://${{ secrets.S3_BUCKET }}/ \
            --exclude "*" \
            --include "*.json" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
