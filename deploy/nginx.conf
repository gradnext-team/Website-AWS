# GradNext Nginx Configuration
# Place this at: /etc/nginx/sites-available/gradnext
# Then: sudo ln -s /etc/nginx/sites-available/gradnext /etc/nginx/sites-enabled/
# Then: sudo certbot --nginx -d api.yourdomain.com

server {
    listen 80;
    server_name api.yourdomain.com;

    # Certbot will add SSL config here automatically
    # After running: sudo certbot --nginx -d api.yourdomain.com

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for streaming responses (SSE, etc.)
        proxy_buffering off;
        proxy_cache off;

        # Timeouts for long-running requests
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;

        # Max upload size (for file uploads)
        client_max_body_size 50M;
    }

    # WebSocket support (if needed)
    location /ws {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Gzip compression
    gzip on;
    gzip_types application/json application/javascript text/plain text/css;
    gzip_min_length 1000;
}
